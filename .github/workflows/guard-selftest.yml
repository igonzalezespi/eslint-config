name: Guard self-test

# Runs the vendored bash-guard's own self-test on every PR, so a broken or un-cabled
# guard is caught in CI instead of silently failing open on a contributor's machine.
# Deliberately standalone and separate from the CI workflow: the guard is a
# zero-dependency plain-node script, so this only needs Node — it must not pull in the
# full pnpm toolchain.
on:
  pull_request:
    branches: [main]

# PR-only workflow: coalesce superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard-selftest:
    name: guard-selftest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Node only: the guard extracts the tool-call JSON via `node -e` (no jq, no deps),
      # so a lightweight setup-node reusing the repo's .nvmrc is all the self-test needs.
      # No pnpm cache here — nothing is installed.
      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc

      - name: bash-guard self-test (expect OK 100/100)
        shell: bash
        run: |
          set +e
          out="$(bash scripts/hooks/bash-guard.test.sh)"
          rc=$?
          echo "$out"
          if [ "$rc" -ne 0 ]; then echo "::error::bash-guard self-test exited $rc"; exit 1; fi
          echo "$out" | grep -q 'OK: 100/100' || {
            echo '::error::bash-guard self-test did not report OK: 100/100'
            exit 1
          }

      # Liveness: prove the guard actually DENIES a forbidden action end-to-end — not
      # merely that its unit tests pass. A push targeting main from a feature branch must
      # exit 2. If the wiring drifts (e.g. the guard silently starts failing open) this
      # turns red.
      - name: Liveness — push-to-main is denied (exit 2)
        shell: bash
        run: |
          set +e
          printf '%s' '{"tool_name":"Bash","tool_input":{"command":"git push origin main"}}' \
            | BASH_GUARD_BRANCH=feature/1-x bash scripts/hooks/bash-guard.sh
          rc=$?
          if [ "$rc" -ne 2 ]; then
            echo "::error::bash-guard did not deny push-to-main (expected exit 2, got $rc)"
            exit 1
          fi
          echo 'OK: bash-guard denied push-to-main with exit 2'

      # Wiring: a guard that passes its tests but is not cabled into the agent runtime is
      # dead code. Assert the hook config invokes bash-guard as a PreToolUse Bash hook.
      - name: Wiring — settings.json cables bash-guard
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const s = JSON.parse(fs.readFileSync(".claude/settings.json", "utf8"));
            const pre = (s.hooks && s.hooks.PreToolUse) || [];
            const cabled = pre.some((g) =>
              (g.matcher || "").split("|").includes("Bash") &&
              (g.hooks || []).some((h) => typeof h.command === "string" && h.command.includes("bash-guard.sh")));
            if (!cabled) {
              console.error("::error::.claude/settings.json PreToolUse must cable bash-guard.sh as a Bash hook");
              process.exit(1);
            }
            console.log("OK: settings.json cables bash-guard.sh PreToolUse hook");
          '
